name: Flim

options:
  bundleIdPrefix: com.flim
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

packages:
  supabase-swift:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0

targets:
  Flim:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Flim
    entitlements:
      path: Flim/Flim.entitlements
      properties:
        # Resolved per build config: development (Debug) / production (Release).
        # Distribution/TestFlight builds require production, so this must vary.
        aps-environment: $(APS_ENVIRONMENT)
    info:
      path: Flim/Info.plist
      properties:
        CFBundleDisplayName: FLIM
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "FLIM uses your camera to take disposable photos that develop over time."
        UIUserInterfaceStyle: Dark
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              # Kept as com.lapse.app to match the Supabase auth redirect allowlist.
              - com.lapse.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flim.app
        SWIFT_VERSION: "5.9"
        # Set this to your 10-char Apple Team ID for local on-device runs.
        # CI overrides it at build time, so leaving it empty is fine for CI.
        DEVELOPMENT_TEAM: ""
        ENABLE_PREVIEWS: YES
        # Versioning — CI passes CURRENT_PROJECT_VERSION=<next TestFlight build>.
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
      configs:
        Debug:
          APS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production
    dependencies:
      - package: supabase-swift
        product: Supabase

schemes:
  Flim:
    build:
      targets:
        Flim: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
