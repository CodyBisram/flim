name: Flim

options:
  bundleIdPrefix: com.flim
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

packages:
  supabase-swift:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0

targets:
  Flim:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Flim
    entitlements:
      path: Flim/Flim.entitlements
      properties:
        # Resolved per build config: development (Debug) / production (Release).
        # Distribution/TestFlight builds require production, so this must vary.
        aps-environment: $(APS_ENVIRONMENT)
    info:
      path: Flim/Info.plist
      properties:
        # Home-screen app name. To rename the app: change this + AppInfo.appName (covers the UI).
        CFBundleDisplayName: FLIM
        # App uses only standard HTTPS (exempt encryption) — declaring this skips
        # the per-build export-compliance prompt so builds reach testers automatically.
        ITSAppUsesNonExemptEncryption: false
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Modern launch screen (no storyboard file needed on iOS 14+).
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Used to take disposable photos that develop over time."
        NSPhotoLibraryAddUsageDescription: "Save your developed photos to your camera roll."
        UIUserInterfaceStyle: Dark
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              # Kept as com.lapse.app to match the Supabase auth redirect allowlist.
              - com.lapse.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flim.app
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: DCU7GHRVUQ
        ENABLE_PREVIEWS: YES
        # iPhone only — a portrait camera app; avoids iPad multitasking requirements.
        TARGETED_DEVICE_FAMILY: "1"
        # Versioning — CI passes CURRENT_PROJECT_VERSION=<next TestFlight build>.
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
      configs:
        Debug:
          APS_ENVIRONMENT: development
          CODE_SIGN_STYLE: Automatic
        Release:
          APS_ENVIRONMENT: production
          # Signing lives on the APP TARGET (not global xcargs) so it doesn't
          # leak onto SPM package targets, which reject provisioning profiles.
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore com.flim.app"
    dependencies:
      - package: supabase-swift
        product: Supabase

  FlimTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FlimTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.flim.app.tests
        SWIFT_VERSION: "5.9"
    dependencies:
      - target: Flim

schemes:
  Flim:
    build:
      targets:
        Flim: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FlimTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
