name: iOS · TestFlight

# PRs get a fast, secret-free simulator build (proof it compiles).
# Pushing to main (or running this workflow by hand) signs the app and ships
# it to TestFlight.
on:
  push:
    branches: [main]
    # Skip TestFlight builds for changes that can't affect the app binary —
    # docs, agent config, the Vercel site (deployed separately), and LUT tooling
    # (only the bundled .cube in Flim/Resources affects the app).
    paths-ignore:
      - ".claude/**"
      - "docs/**"
      - "web/**"
      - "scripts/**"
      - "*.md"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # PR validation — compile for the simulator. No signing, no secrets needed.
  # --------------------------------------------------------------------------
  build:
    name: Build (simulator)
    if: github.event_name == 'pull_request'
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable   # pin to e.g. '26.3' if a beta sneaks in

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project Flim.xcodeproj \
            -scheme Flim \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            build | xcbeautify --renderer github-actions || \
          xcodebuild \
            -project Flim.xcodeproj -scheme Flim -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation CODE_SIGNING_ALLOWED=NO build

  # --------------------------------------------------------------------------
  # Ship — signed Release archive uploaded to TestFlight.
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy to TestFlight
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Ruby + fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build & upload to TestFlight
        run: bundle exec fastlane beta
        env:
          ASC_KEY_ID:                    ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:                 ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8:                    ${{ secrets.ASC_KEY_P8 }}
          APPLE_TEAM_ID:                 ${{ secrets.APPLE_TEAM_ID }}
          MATCH_PASSWORD:                ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL:                 ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          # Keep fastlane quiet/non-interactive and CI-friendly.
          FASTLANE_HIDE_CHANGELOG: "true"
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "120"
